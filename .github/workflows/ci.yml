name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Tests run first - if they fail, other checks are skipped
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        id: pytest
        run: |
          # Use pytest-cov for better coverage tracking with module patching
          python -m pytest tests/ \
            --cov=openpaws \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Check per-file coverage thresholds
        run: python scripts/check_coverage.py --use-xml

      - name: Upload coverage data
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: |
            coverage.xml
            .coverage
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload test results
        if: matrix.python-version == '3.12' && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          if-no-files-found: warn

  # Code quality checks only run after tests pass
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install radon xenon

      - name: Check cyclomatic complexity (xenon)
        run: xenon --max-absolute C --max-modules A --max-average A src/openpaws/

      - name: Show complexity metrics (radon)
        run: radon cc src/openpaws/ -a -s

  function-length:
    name: Function Length
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check function length
        run: python scripts/check_function_length.py src/

  # Quality report runs after all checks (always, to report failures)
  quality-report:
    name: Quality Report
    runs-on: ubuntu-latest
    needs: [test, lint, complexity, function-length]
    if: always() && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
        continue-on-error: true

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
        continue-on-error: true

      - name: Collect failed jobs
        id: failures
        run: |
          FAILED_JOBS=""
          if [ "${{ needs.test.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Tests,"
          fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Lint,"
          fi
          if [ "${{ needs.complexity.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Complexity,"
          fi
          if [ "${{ needs.function-length.result }}" = "failure" ]; then
            FAILED_JOBS="${FAILED_JOBS}Function Length,"
          fi
          # Remove trailing comma
          FAILED_JOBS="${FAILED_JOBS%,}"
          echo "failed_jobs=${FAILED_JOBS}" >> $GITHUB_OUTPUT

      - name: Generate quality report
        run: |
          if [ -n "${{ steps.failures.outputs.failed_jobs }}" ]; then
            python scripts/quality_report.py -o quality-report.md \
              --failed-jobs "${{ steps.failures.outputs.failed_jobs }}"
          else
            python scripts/quality_report.py -o quality-report.md
          fi

      - name: Post quality report to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: quality-report
          path: quality-report.md
